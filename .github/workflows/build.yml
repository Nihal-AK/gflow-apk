name: Build G·FLOW Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🌐 Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index-1.html" ]; then
            cp index-1.html www/index.html
          else
            echo "<h1>G-FLOW Pro UI Missing</h1>" > www/index.html
          fi

      - name: 📱 Add and Sync Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: 🔍 Verify Plugin Synchronization
        run: |
          CONFIG_FILE="android/app/src/main/assets/capacitor.plugins.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ ERROR: capacitor.plugins.json not found! Sync failed."
            exit 1
          fi
          
          # Check for 'usb' or 'serial' in the synced plugins JSON
          if grep -i -E "usb|serial" "$CONFIG_FILE" > /dev/null; then
            echo "✅ USB Serial plugin verified in synced assets."
          else
            echo "❌ ERROR: USB Serial plugin is missing from the synced configuration!"
            echo "--- Contents of capacitor.plugins.json ---"
            cat "$CONFIG_FILE"
            exit 1
          fi

      - name: 🌐 Inject JitPack Repository
        run: |
          cat > add-jitpack.js << 'EOF'
          const fs = require('fs');
          const buildGradle = 'android/build.gradle';
          const settingsGradle = 'android/settings.gradle';

          // 1. Try modern dependencyResolutionManagement (Capacitor 6+ / newer Android)
          if (fs.existsSync(settingsGradle)) {
            let settings = fs.readFileSync(settingsGradle, 'utf8');
            if (settings.includes('dependencyResolutionManagement') && !settings.includes('jitpack.io')) {
              settings = settings.replace(
                /(repositories\s*\{)/, 
                "$1\n        maven { url 'https://jitpack.io' }"
              );
              fs.writeFileSync(settingsGradle, settings);
              console.log("✅ JitPack injected into settings.gradle");
            }
          }

          // 2. Try legacy allprojects block (Capacitor 5 and below)
          if (fs.existsSync(buildGradle)) {
            let build = fs.readFileSync(buildGradle, 'utf8');
            if (build.includes('allprojects') && !build.includes('jitpack.io')) {
              build = build.replace(
                /(allprojects\s*\{\s*repositories\s*\{)/, 
                "$1\n        maven { url 'https://jitpack.io' }"
              );
              fs.writeFileSync(buildGradle, build);
              console.log("✅ JitPack injected into build.gradle");
            }
          }
          EOF
          node add-jitpack.js

      - name: 🔌 Create USB device filter
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/usb_device_filter.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <usb-device vendor-id="6790" product-id="29987"/>
              <usb-device vendor-id="1027" product-id="24577"/>
              <usb-device vendor-id="9025" product-id="16"/>
              <usb-device vendor-id="4292" product-id="60000"/>
          </resources>
          EOF

      - name: 💉 Safe Inject USB host support into Manifest
        run: |
          cat > inject.js << 'EOF'
          const fs = require('fs');
          const path = 'android/app/src/main/AndroidManifest.xml';
          
          if (!fs.existsSync(path)) {
            console.error("AndroidManifest.xml not found!");
            process.exit(1);
          }

          let xml = fs.readFileSync(path, 'utf8');

          // 1. Inject USB Host Feature
          if (!xml.includes('android.hardware.usb.host')) {
            xml = xml.replace(
              /<application/g,
              '<uses-feature android:name="android.hardware.usb.host" android:required="true" />\n\n    <application'
            );
          }

          // 2. Safe Intent Filter Injection specifically targeted at MainActivity
          if (!xml.includes('USB_DEVICE_ATTACHED')) {
            const injection = `
                <intent-filter>
                    <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"/>
                </intent-filter>
                <meta-data
                    android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"
                    android:resource="@xml/usb_device_filter"/>`;
            
            // Regex strictly matches the opening <activity> tag containing "MainActivity" 
            // all the way down to its specific closing </activity> tag.
            const mainActivityRegex = /(<activity[^>]*android:name="[^"]*MainActivity"[^>]*>[\s\S]*?)(<\/activity>)/;
            
            if (mainActivityRegex.test(xml)) {
              // $1 represents everything inside the activity tag, $2 is the closing tag
              xml = xml.replace(mainActivityRegex, `$1${injection}\n        $2`);
              console.log("✅ Manifest successfully updated with USB intents into MainActivity.");
            } else {
              console.error("❌ ERROR: MainActivity not found in Manifest! Could not safely inject.");
              process.exit(1);
            }
          }

          fs.writeFileSync(path, xml);
          EOF
          node inject.js

      - name: 🛠️ Make Gradle executable
        run: chmod +x android/gradlew

      - name: 🚀 Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFlowPro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          
