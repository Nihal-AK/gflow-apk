name: Build G·FLOW Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create www folder and copy index.html
        run: |
          mkdir -p www
          cp index-1.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Fix variables.gradle
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
              coreSplashScreenVersion = '1.0.1'
          }
          EOF

      - name: Create USB device filter XML
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/usb_device_filter.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <usb-device vendor-id="6790" product-id="29987" />
            <usb-device vendor-id="1027" product-id="24577" />
            <usb-device vendor-id="9025" product-id="16"    />
            <usb-device vendor-id="4292" product-id="60000" />
          </resources>
          EOF

      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-feature android:name="android.hardware.usb.host" />\n    <uses-permission android:name="android.permission.USB_PERMISSION" />|' $MANIFEST
          sed -i 's|</activity>|    <intent-filter>\n                <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />\n            </intent-filter>\n            <meta-data\n                android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"\n                android:resource="@xml/usb_device_filter" />\n        </activity>|' $MANIFEST

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Check APK exists
        run: |
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ || echo "APK folder not found"
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFlowPro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
