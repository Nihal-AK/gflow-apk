name: Build G·FLOW Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Verify npm plugin installation
        run: |
          if ! npm ls | grep -iE "usb-serial|usbserial"; then
            echo "::error::The USB plugin is completely missing from the npm installation."
            exit 1
          else
            echo "NPM successfully installed the plugin!"
          fi

      - name: Create www folder and copy index.html
        run: |
          mkdir -p www
          cp index-1.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify plugin registration
        run: |
          echo "=== Contents of capacitor.plugins.json ==="
          find android -name "capacitor.plugins.json" -exec cat {} \;
          echo ""
          echo "=== Contents of cordova_plugins.js ==="
          find android -name "cordova_plugins.js" -exec cat {} \;
          echo ""
          echo "=== Grepping for usbserial ==="
          if ! grep -qR -iE "usb.serial|usbserial" android; then
            echo "::error::USB Serial plugin not found after cap sync! Capacitor rejected the plugin."
            exit 1
          else
            echo "Plugin successfully found in Android directory!"
          fi

      - name: Write variables.gradle
        run: |
          cat > android/variables.gradle << 'GRADLE'
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.6.1'
              androidxPreferenceVersion = '1.2.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          GRADLE

      - name: Write USB device filter XML
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/usb_device_filter.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <usb-device vendor-id="6790" product-id="29987" />
            <usb-device vendor-id="1027" product-id="24577" />
            <usb-device vendor-id="9025" product-id="16"    />
            <usb-device vendor-id="4292" product-id="60000" />
          </resources>
          XML

      - name: Safely inject Manifest permissions
        run: |
          cat > inject-manifest.js << 'JSEOF'
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let content = fs.readFileSync(file, 'utf8');
          const featureToInject = '    <uses-feature android:name="android.hardware.usb.host" required="true" />';
          const intentToInject = `
                  <intent-filter>
                      <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                  </intent-filter>
                  <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />`;
          if (!content.includes('android.hardware.usb.host')) {
              content = content.replace('<application', featureToInject + '\n    <application');
          }
          if (!content.includes('USB_DEVICE_ATTACHED')) {
              content = content.replace('</intent-filter>', '</intent-filter>\n' + intentToInject);
          }
          fs.writeFileSync(file, content);
          console.log('Manifest injected successfully.');
          JSEOF
          node inject-manifest.js

      - name: Fix UsbSerial Java typo if present
        run: |
          FILE=$(find android -name "UsbSerial.java" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/Serial\.class/UsbSerial.class/g' "$FILE"
            sed -i 's/Serial\.this/UsbSerial.this/g' "$FILE"
            echo "Checked and fixed typos in: $FILE"
          else
            echo "UsbSerial.java not found - plugin may use different class name, continuing..."
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFlowPro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
