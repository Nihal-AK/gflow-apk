name: Build G·FLOW Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create www folder and copy index.html
        run: |
          mkdir -p www
          cp index-1.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Show Capacitor generated files
        run: |
          echo "====== variables.gradle ======"
          cat android/variables.gradle
          echo ""
          echo "====== app/build.gradle ======"
          cat android/app/build.gradle
          echo ""
          echo "====== build.gradle (root) ======"
          cat android/build.gradle
          echo ""
          echo "====== AndroidManifest.xml ======"
          cat android/app/src/main/AndroidManifest.xml

      - name: Write variables.gradle
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.6.1'
              androidxPreferenceVersion = '1.2.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

      - name: Write USB device filter XML
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/usb_device_filter.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <usb-device vendor-id="6790" product-id="29987" />
            <usb-device vendor-id="1027" product-id="24577" />
            <usb-device vendor-id="9025" product-id="16"    />
            <usb-device vendor-id="4292" product-id="60000" />
          </resources>
          EOF

      - name: Write AndroidManifest with USB permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-feature android:name="android.hardware.usb.host" />
              <uses-permission android:name="android.permission.USB_PERMISSION" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data
                          android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"
                          android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix broken USB plugin typos
        run: |
          FILE="android/capacitor-cordova-android-plugins/src/main/java/com/dchs/usbserial/UsbSerial.java"
          if [ -f "$FILE" ]; then
            sed -i 's/Serial\.class/UsbSerial.class/g' "$FILE"
            sed -i 's/Serial\.this/UsbSerial.this/g' "$FILE"
            echo "Fixed typos in UsbSerial.java!"
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        continue-on-error: true
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Check APK output
        run: |
          echo "====== Searching for APK ======"
          find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"
          echo ""
          echo "====== Build output folder ======"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Folder not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GFlowPro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
